<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Django Table Processor</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Golos+Text:wght@400;500;600&display=swap">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --surface2: #1e2335;
      --border: #2a3050;
      --accent: #4f8ef7;
      --accent-dim: #2a4a8a;
      --success: #3ecf8e;
      --error: #f75f5f;
      --warning: #f7c948;
      --text: #e8eaf6;
      --text-dim: #7b82a0;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Golos Text', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-badge {
      background: var(--accent-dim);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .header-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
    }
    .btn-icon {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Sheet info ── */
    .sheet-info {
      display: flex;
      gap: 10px;
      padding: 8px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .info-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--mono);
      font-size: 11px;
    }
    .info-label {
      color: var(--text-dim);
    }
    .info-value {
      color: var(--accent);
      font-weight: 600;
    }

    /* ── Main content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    select, input[type="text"], textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 5px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    select:focus, input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
    }
    textarea {
      resize: vertical;
      min-height: 52px;
      font-size: 11px;
    }

    /* ── Settings panel ── */
    #settings-panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      display: none;
      flex-direction: column;
      gap: 8px;
    }
    #settings-panel.open { display: flex; }

    /* ── Action buttons ── */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 9px 12px;
      border-radius: 5px;
      font-family: var(--sans);
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      text-align: center;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 9px 12px;
      border-radius: 5px;
      font-family: var(--sans);
      font-weight: 500;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-secondary:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* ── Status ── */
    .status-bar {
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-icon {
      font-size: 13px;
      width: 16px;
      text-align: center;
      flex-shrink: 0;
    }
    .icon-idle    { color: var(--text-dim); }
    .icon-loading { color: var(--accent); animation: spin 1s linear infinite; }
    .icon-success { color: var(--success); }
    .icon-error   { color: var(--error); }

    .status-text {
      font-family: var(--mono);
      font-size: 11px;
      flex: 1;
    }
    .status-idle    { color: var(--text-dim); }
    .status-loading { color: var(--accent); }
    .status-success { color: var(--success); }
    .status-error   { color: var(--error); }

    /* ── Progress bar ── */
    #progress-bar {
      display: none;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      animation: progress-anim 1.5s ease-in-out infinite;
      width: 40%;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes progress-anim {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-title">
      <span class="header-badge">API</span>
      <span class="header-name">Django Processor</span>
    </div>
    <button class="btn-icon" id="btn-settings" title="Настройки">⚙</button>
  </div>

  <!-- Sheet info -->
  <div class="sheet-info">
    <div class="info-chip">
      <span class="info-label">Лист:</span>
      <span class="info-value" id="info-sheet">—</span>
    </div>
    <div class="info-chip">
      <span class="info-label">Диапазон:</span>
      <span class="info-value" id="info-range">—</span>
    </div>
  </div>

  <!-- Progress -->
  <div id="progress-bar"><div class="progress-fill"></div></div>

  <!-- Main content -->
  <div class="content">

    <!-- Macro selection -->
    <div class="field-group">
      <label class="field-label">Макрос / операция</label>
      <select id="macro-select">
        <option value="default">default — основной макрос</option>
        <option value="normalize">normalize — нормализация данных</option>
        <option value="aggregate">aggregate — агрегация строк</option>
        <option value="validate">validate — валидация ячеек</option>
        <option value="format">format — форматирование</option>
      </select>
    </div>

    <!-- Write mode -->
    <div class="field-group">
      <label class="field-label">Куда записать результат</label>
      <select id="write-mode">
        <option value="overwrite">Перезаписать исходные ячейки</option>
        <option value="server_defined">Позиция из ответа сервера</option>
      </select>
    </div>

    <!-- Extra params -->
    <div class="field-group">
      <label class="field-label">Доп. параметры (JSON, необязательно)</label>
      <textarea id="extra-params" placeholder='{"threshold": 0.5, "locale": "ru"}'></textarea>
    </div>

    <!-- Settings panel -->
    <div id="settings-panel">
      <div class="field-group">
        <label class="field-label">URL сервера</label>
        <input type="text" id="server-url-input" placeholder="https://your-server.com/api/process/">
      </div>
    </div>

  </div>

  <!-- Action buttons -->
  <div class="actions" style="padding: 0 14px 10px;">
    <button class="btn-primary" id="btn-process-all">▶ Весь лист</button>
    <button class="btn-secondary" id="btn-process-selection">⊡ Выделение</button>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-icon icon-idle" id="status-icon">○</span>
    <span class="status-text status-idle" id="status-message">Готов к работе</span>
  </div>

  <script src="pluginCode.js"></script>
  <script src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins.js"></script>
  <script src="https://onlyoffice.github.io/sdkjs-plugins/v1/plugins-ui.js"></script>

</body>
</html>
